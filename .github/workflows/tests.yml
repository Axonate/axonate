name: tests

# Run the no-Docker unit suite on every push + PR. These tests cover the router's pure logic —
# routing/scoring, health + circuit breaker, response cache, surface resolution, trace stats,
# ax header building, token-expiry evaluation — and need no services, just the Python deps.

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install service deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/router/requirements.txt
          pip install -r services/adapter/requirements.txt

      - name: Run unit suite
        run: |
          set -e
          fail=0
          for t in tests/test_*.py; do
            echo "== $t =="
            python3 "$t" || fail=1
          done
          exit $fail
