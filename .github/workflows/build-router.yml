name: build-router

# Builds the Axonate router image and pushes it to GitHub Container Registry.
# The router is the only Axonate-authored service image the Helm chart needs
# (litellm/cloudflared/postgres come from public registries). GHCR auto-creates
# the package on first push — no repo to pre-create.
#
# Triggers:
#   - push of a v* tag  -> versioned release image (e.g. v1.0)
#   - manual dispatch   -> build from the chosen ref
#
# After the first successful run, make the package public (or attach a pull
# secret) and set the chart value:
#   image.router.repository=ghcr.io/<owner>/axonate-router
#   image.router.digest=<the digest printed in the run summary>

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Lowercases the image name and derives tags/labels from the git ref.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/axonate-router
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build context is the repo root (the Dockerfile COPYs from services/auth
      # and config/ too), with the router Dockerfile.
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: services/router/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Router image pushed"
            echo ""
            echo "**Digest:** \`${{ steps.build.outputs.digest }}\`"
            echo ""
            echo "Set in chart values.yaml:"
            echo '```yaml'
            echo "image:"
            echo "  router:"
            echo "    repository: ghcr.io/${{ github.repository_owner }}/axonate-router"
            echo "    digest: \"${{ steps.build.outputs.digest }}\""
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
