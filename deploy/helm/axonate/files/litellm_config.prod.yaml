# Axonate LiteLLM proxy config (PRODUCTION). Same model NAMES as the POC config so clients
# never change — only the backends differ (real APIs instead of adapter/subscription).
# Selected via LITELLM_CONFIG=litellm_config.prod.yaml in .env (see SWAP.md).

model_list:
  - model_name: claude                       # was: adapter acctA
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
  - model_name: codex                        # was: adapter codex
    litellm_params:
      model: openai/gpt-5.1
      api_key: os.environ/OPENAI_API_KEY
  - model_name: minimax                      # was: subscription key
    litellm_params:
      model: openai/MiniMax-M2.5
      api_base: os.environ/MINIMAX_BASE_URL
      api_key: os.environ/MINIMAX_API_KEY
  - model_name: deepseek                     # optional, prod-only
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

litellm_settings:
  drop_params: true
  num_retries: 1
  max_budget: 500              # GOLIVE §2 [B] hard global ceiling (USD / budget_duration). TUNE.
  budget_duration: 30d

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  alerting: ["slack"]          # set SLACK_WEBHOOK_URL
  alerting_threshold: 300
  # clean daily digest via scripts/spend_digest.py; native spend_reports dropped (noisy)
  alert_types: ["budget_alerts", "outage_alerts", "db_exceptions"]
