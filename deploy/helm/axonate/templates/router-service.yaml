apiVersion: v1
kind: Service
metadata:
  name: {{ include "axonate.fullname" . }}-router
  labels:
    {{- include "axonate.labels" . | nindent 4 }}
    app.kubernetes.io/component: router
spec:
  type: ClusterIP
  selector:
    {{- include "axonate.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: router
  ports:
    - name: http
      port: 4100
      targetPort: 4100
