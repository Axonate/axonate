{{- if not .Values.secret.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "axonate.fullname" . }}
  labels:
    {{- include "axonate.labels" . | nindent 4 }}
type: Opaque
stringData:
  LITELLM_MASTER_KEY: {{ required "secret.masterKey is required" .Values.secret.masterKey | quote }}
  LITELLM_SALT_KEY: {{ required "secret.saltKey is required" .Values.secret.saltKey | quote }}
  DATABASE_URL: {{ include "axonate.databaseUrl" . | quote }}
  POSTGRES_HOST: {{ include "axonate.pgHost" . | quote }}
  POSTGRES_USER: {{ .Values.secret.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.secret.postgres.password | quote }}
  POSTGRES_DB: {{ .Values.secret.postgres.database | quote }}
  CLOUDFLARE_TUNNEL_TOKEN: {{ .Values.secret.tunnelToken | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secret.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.secret.openaiApiKey | quote }}
  DEEPSEEK_API_KEY: {{ .Values.secret.deepseekApiKey | quote }}
  MINIMAX_API_KEY: {{ .Values.secret.minimaxApiKey | quote }}
  MINIMAX_BASE_URL: {{ .Values.secret.minimaxBaseUrl | quote }}
{{- end }}
