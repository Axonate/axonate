# Axonate routing policy for model "auto". All opinions live HERE, not in router.py.
# Edit + restart axonate-router to retune. Rules evaluated top-down; first match wins.

# Backends the router may choose between (must exist as models in litellm_config.yaml).
backends:
  claude:
    cost: 3          # relative cost rank (1=cheapest). Used by the cost/quota signal.
    strengths: [reason, analysis, writing]   # 'reason' aligns with a task_categories key
  codex:
    cost: 3
    strengths: [code, refactor, debug]       # 'code' aligns with a task_categories key
  minimax:
    cost: 1          # cheapest/most abundant -> preferred for easy + bulk work
    strengths: [summarize, bulk, transform]  # 'summarize' aligns with a task_categories key

default: minimax     # fallback when no rule matches

# Keyword rules: if any keyword appears (case-insensitive) in the prompt -> backend.
keyword_rules:
  - backend: codex
    keywords: [code, function, refactor, debug, bug, compile, stack trace, regex, "def ", "class ", import]
  - backend: minimax
    keywords: [summarize, summary, translate, bulk, extract, classify, rewrite, transform, list]
  - backend: claude
    keywords: [reason, analyze, explain why, design, architecture, trade-off, plan, prove]

# Length rule: very short prompts are "easy" -> bias to the cheap backend.
length_rule:
  short_char_threshold: 240   # <= this many chars counts as "easy"
  short_backend: minimax

# Cost/quota signal. When two paths are plausible, prefer cheaper/abundant for easy tasks
# and avoid a backend that is near its budget ceiling.
cost_quota:
  enabled: true
  prefer_cheap_for_easy: true        # easy task -> lowest-cost backend
  avoid_near_limit: true             # skip a backend at/above the threshold of its budget
  near_limit_fraction: 0.9           # 0.9 = treat >=90% of budget spent as "near limit"

# Optional LLM classifier (off for POC — keyword+length+cost is enough).
classifier:
  enabled: false

# ---- Scoring router (the differentiator). When enabled, model:auto picks the backend by
# scoring task-fit + cost/budget + live health, instead of first-match-wins. Set enabled:false
# to roll back to the legacy keyword router above. Retune weights/knobs here; restart router.
scoring:
  enabled: true
  weights: { task: 1.0, cost: 0.5, health: 0.75 }
  cost_easy_boost: 2.0          # multiply the cost weight when the task is easy/empty OR near budget
  health_window: 20             # recent calls per backend kept for the in-memory health signal
  latency_norm_ms: 4000         # latency at/above this -> speed component 0
  circuit_break_failures: 3     # >= this many failures within the window -> backend circuit-broken
  circuit_break_penalty: 100    # score penalty for a circuit-broken backend (so it's skipped)
  health_default: 0.7           # neutral health for a cold/unknown backend

# ---- Response cache (exact-match, in-memory). Identical low-temperature requests return instantly
# without a backend call (cost + latency win). Bypass per-request with body {"cache": false} or the
# X-Axonate-No-Cache header; force with {"cache": true}. enabled:false fully disables.
cache:
  enabled: true
  ttl_seconds: 3600       # how long a cached response stays valid
  max_temperature: 0.5    # only cache requests at/below this temperature (absent temp -> not cached)
  max_entries: 1000       # bounded; evicts soonest-to-expire when full

# Word-boundary task detection (replaces the brittle substring keyword_rules when scoring is on).
# Each detected tag is matched against a backend's `strengths`.
task_categories:
  code:      [code, function, refactor, debug, bug, compile, "stack trace", regex, def, class, import]
  reason:    [reason, analyze, "explain why", design, architecture, "trade-off", plan, prove]
  summarize: [summarize, summary, translate, bulk, extract, classify, rewrite, transform, list]
